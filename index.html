            { part: "PHẦN I", type: 'mcq', question: "Cá chép Việt Nam có giá trị giới hạn dưới và giới hạn trên về nhiệt độ lần lượt là 2ºC và 44ºC. Khoảng giá trị nhiệt độ này được gọi là", options: [ { id: 'A', text: 'Ổ sinh thái.', isCorrect: false }, { id: 'B', text: 'Khoảng thuận lợi.', isCorrect: false }, { id: 'C', text: 'Giới hạn sinh thái.', isCorrect: true }, { id: 'D', text: 'Vùng cực thuận.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', question: "Da người có thể là môi trường sống của", options: [ { id: 'A', text: 'Giun đũa kí sinh.', isCorrect: false }, { id: 'B', text: 'Chấy, rận, nấm.', isCorrect: true }, { id: 'C', text: 'Sâu.', isCorrect: false }, { id: 'D', text: 'Thực vật bậc thấp.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', question: "Cá chép có môi trường sống là", options: [ { id: 'A', text: 'Đất.', isCorrect: false }, { id: 'B', text: 'Nước.', isCorrect: true }, { id: 'C', text: 'Không khí.', isCorrect: false }, { id: 'D', text: 'Sinh vật.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', question: "Cá rô phi Việt Nam chịu lạnh đến 5,6ºC, chịu nóng đến 42ºC, các chức năng sống biểu hiện tốt nhất từ 20ºC đến 35ºC. Khoảng nhiệt độ 20ºC đến 35ºC được gọi là", options: [ { id: 'A', text: 'Giới hạn chịu đựng.', isCorrect: false }, { id: 'B', text: 'Khoảng thuận lợi.', isCorrect: true }, { id: 'C', text: 'Điểm gây chết giới hạn trên.', isCorrect: false }, { id: 'D', text: 'Điểm gây chết giới hạn dưới.', isCorrect: false } ] },
            
            // PHẦN II
            { part: "PHẦN II", type: 'tf', question: "Dựa vào hình ảnh cấu tạo xương chi trước của Người, Báo, Cá voi, Dơi. Các nhận định dưới đây là đúng hay sai?", statements: [ { id: 'a', text: 'Đây là những cơ quan nằm ở những vị trí tương ứng.', isTrue: true }, { id: 'b', text: 'Đây là những cơ quan thể hiện hướng tiến hóa phân li.', isTrue: true }, { id: 'c', text: 'Đây là những cơ quan tương tự.', isTrue: false }, { id: 'd', text: 'Gai xương rồng và tua cuốn là tương tự nhau.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', question: "Khi nói về bằng chứng tiến hóa, phát biểu sau đây là đúng hay sai?", statements: [ { id: 'a', text: 'Cơ quan thực hiện chức năng khác nhau, cùng nguồn gốc là tương đồng.', isTrue: true }, { id: 'b', text: 'Cơ quan thoái hóa phản ánh tiến hóa đồng quy.', isTrue: false }, { id: 'c', text: 'Trình tự axit amin càng khác xa nhau thì họ hàng càng gần.', isTrue: false }, { id: 'd', text: 'Mọi sinh vật đều cấu tạo từ tế bào.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', question: "Khi nói về thuyết tiến hóa hiện đại, các nhận xét sau đây là đúng hay sai?", statements: [ { id: 'a', text: 'Chia thành tiến hóa nhỏ và tiến hóa lớn.', isTrue: true }, { id: 'b', text: 'Tiến hóa nhỏ là biến đổi kiểu hình.', isTrue: false }, { id: 'c', text: 'Tiến hóa nhỏ hình thành các đơn vị trên loài.', isTrue: false }, { id: 'd', text: 'Đơn vị tiến hóa cơ sở là cá thể.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', question: "Khi nói về đặc điểm thích nghi, các nhận định dưới đây là đúng hay sai?", statements: [ { id: 'a', text: 'Áp lực chọn lọc lớn thì hình thành thích nghi chậm.', isTrue: false }, { id: 'b', text: 'Mỗi đặc điểm thích nghi chỉ hợp lý tương đối.', isTrue: true }, { id: 'c', text: 'Vi khuẩn kháng thuốc nhanh vì sinh sản nhanh.', isTrue: true }, { id: 'd', text: 'Không có DDT, ruồi đột biến kháng DDT vẫn ưu thế.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', question: "Hai loài họ hàng sống cùng khu phân bố nhưng không giao phối. Nhận định sau đúng hay sai?", statements: [ { id: 'a', text: 'Chúng có nơi ở khác nhau.', isTrue: true }, { id: 'b', text: 'Giao phối tạo ra con lai bất thụ.', isTrue: true }, { id: 'c', text: 'Chúng có mùa sinh sản khác nhau.', isTrue: true }, { id: 'd', text: 'Con lai có sức sống kém.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', question: "Các phát biểu sau về các nhân tố sinh thái là đúng hay sai?", statements: [ { id: 'a', text: 'Ổ sinh thái hình thành khi các nhân tố nằm trong giới hạn cho phép.', isTrue: true }, { id: 'b', text: 'Vô sinh bao gồm cả các nhân tố sinh học.', isTrue: false }, { id: 'c', text: 'Hữu sinh bao gồm cả mối quan hệ sinh vật.', isTrue: true }, { id: 'd', text: 'Nhân tố con người ảnh hưởng lớn đời sống sinh vật.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', question: "Khi nói về giới hạn sinh thái, các phát biểu sau là đúng hay sai?", statements: [ { id: 'a', text: 'Giới hạn sinh thái là khoảng xác định của nhiều nhân tố.', isTrue: false }, { id: 'b', text: 'Cơ thể non có giới hạn sinh thái hẹp.', isTrue: true }, { id: 'c', text: 'Khoảng chống chịu gây ức chế hoạt động sinh lý.', isTrue: true }, { id: 'd', text: 'Loài vùng cực giới hạn nhiệt độ rộng hơn xích đạo.', isTrue: false } ] },
            
            // PHẦN III
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu bằng chứng không phải giải phẫu học so sánh trong 6 ý (xem mã gốc)?", correctAnswer: "2" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu đặc điểm phù hợp phiêu bạt di truyền trong 4 ý?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu ví dụ là cơ quan tương đồng trong 4 ý?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', question: "Loài C (lai A=12 và B=16) có bộ NST dị đa bội là bao nhiêu?", correctAnswer: "28" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu nhân tố vô sinh trong danh sách?", correctAnswer: "5" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu loài sống ở một loại môi trường xác định?", correctAnswer: "4" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu đặc điểm phù hợp cây ưa sáng?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', question: "Có bao nhiêu đặc điểm thể hiện quy luật tác động của nhân tố sinh thái?", correctAnswer: "4" }
        ];

        let quizData = [];
        let currentIndex = 0, correctCount = 0, isCorrected = false, optionStatuses = {}, hasAttempted = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function prepareData() {
            const p1 = shuffle(quizDataRaw.filter(i => i.part === "PHẦN I")).map((q, idx) => {
                q.displayTitle = `Câu ${idx + 1}. ${q.question}`;
                q.options = shuffle([...q.options]); // Đảo đáp án
                return q;
            });

            const p2 = shuffle(quizDataRaw.filter(i => i.part === "PHẦN II")).map((q, idx) => {
                q.displayTitle = `Câu ${idx + 1}. ${q.question}`;
                q.statements = shuffle([...q.statements]); // Đảo các ý a,b,c,d
                return q;
            });

            const p3 = shuffle(quizDataRaw.filter(i => i.part === "PHẦN III")).map((q, idx) => {
                q.displayTitle = `Câu ${idx + 1}. ${q.question}`;
                return q;
            });

            quizData = [...p1, ...p2, ...p3];
        }

        window.startQuiz = () => {
            prepareData();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('flex');
            loadQuestion();
        };

        function loadQuestion() {
            isCorrected = false; hasAttempted = false; optionStatuses = {};
            const q = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('part-text').innerText = q.part;
            document.getElementById('progress-bar').style.width = `${(currentIndex / quizData.length) * 100}%`;
            document.getElementById('question').innerText = q.displayTitle;
            renderOptions();
            updateFooter();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const q = quizData[currentIndex];
            const labels = ['A', 'B', 'C', 'D'];

            if(q.type === 'mcq') {
                container.className = "grid grid-cols-1 md:grid-cols-2 gap-3";
                q.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    const status = optionStatuses[index];
                    btn.className = `p-4 border-2 rounded-xl text-left transition-all ${status==='correct'?'bg-emerald-100 border-emerald-500':'bg-white hover:border-emerald-300'}`;
                    // Gán nhãn A, B, C, D cố định theo vị trí mới
                    btn.innerHTML = `<b class="text-emerald-700 mr-2">${labels[index]}.</b> ${opt.text}`;
                    btn.onclick = () => {
                        if(opt.isCorrect) { 
                            optionStatuses[index] = 'correct'; 
                            isCorrected = true; 
                            if(!hasAttempted) correctCount++; 
                        } else { 
                            hasAttempted = true; 
                            alert("Sai rồi! Hãy thử lại."); 
                        }
                        renderOptions(); updateFooter();
                    };
                    if(isCorrected) btn.disabled = true;
                    container.appendChild(btn);
                });
            } else if(q.type === 'tf') {
                container.className = "flex flex-col gap-3";
                const subLabels = ['a', 'b', 'c', 'd'];
                q.statements.forEach((s, index) => {
                    const row = document.createElement('div');
                    const done = optionStatuses[index];
                    row.className = `flex justify-between items-center p-4 border-2 rounded-xl transition-all ${done?'bg-emerald-50 border-emerald-200':'bg-white shadow-sm'}`;
                    row.innerHTML = `<div class="pr-4"><b class="text-emerald-700 mr-1">${subLabels[index]})</b> ${s.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="handleTF(${index}, true)" class="px-4 py-2 border-2 rounded-lg font-bold transition-all ${done && s.isTrue?'bg-emerald-500 border-emerald-500 text-white':'hover:bg-slate-100'}">Đúng</button>
                        <button onclick="handleTF(${index}, false)" class="px-4 py-2 border-2 rounded-lg font-bold transition-all ${done && !s.isTrue?'bg-emerald-500 border-emerald-500 text-white':'hover:bg-slate-100'}">Sai</button>
                    </div>`;
                    container.appendChild(row);
                });
            } else if(q.type === 'short') {
                container.innerHTML = `<div class="flex gap-2">
                    <input type="text" id="short-input" class="short-input border-2 p-4 rounded-xl flex-grow text-lg font-bold" placeholder="Nhập số..." onkeypress="if(event.key==='Enter') handleShort()">
                    <button onclick="handleShort()" class="bg-emerald-600 text-white px-8 rounded-xl font-bold hover:bg-emerald-700 transition-colors">GỬI</button>
                </div>`;
            }
        }

        window.handleTF = (idx, val) => {
            const q = quizData[currentIndex];
            if(val === q.statements[idx].isTrue) { 
                optionStatuses[idx] = true; 
            } else { 
                hasAttempted = true; 
                alert("Ý này chưa đúng!"); 
            }
            if(q.statements.every((_, i) => optionStatuses[i])) { 
                isCorrected = true; 
                if(!hasAttempted) correctCount++; 
            }
            renderOptions(); updateFooter();
        };

        window.handleShort = () => {
            const val = document.getElementById('short-input').value.trim();
            if(val === quizData[currentIndex].correctAnswer) { 
                isCorrected = true; 
                if(!hasAttempted) correctCount++; 
            } else { 
                hasAttempted = true; 
                alert("Số liệu chưa chính xác!"); 
            }
            renderOptions(); updateFooter();
        };

        function updateFooter() {
            const btn = document.getElementById('next-btn');
            btn.classList.toggle('hidden', !isCorrected);
        }

        window.nextQuestion = () => {
            if(currentIndex < quizData.length - 1) { 
                currentIndex++; 
                loadQuestion(); 
            } else {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('score').innerText = correctCount;
            }
        };

        // Modal logic (giữ nguyên pass 8168)
        window.openPasswordModal = () => document.getElementById('password-modal').classList.remove('hidden');
        window.closeModals = () => { document.getElementById('password-modal').classList.add('hidden'); };
        window.verifyPassword = () => {
            if(document.getElementById('history-password').value === '8168') alert("Tính năng lịch sử yêu cầu kết nối Firebase.");
        };
    </script>

    <div id="password-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full">
            <h3 class="text-xl font-bold mb-4">Mật khẩu</h3>
            <input type="password" id="history-password" class="w-full border-2 p-2 rounded-xl mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="window.closeModals()" class="px-4 py-2">Hủy</button>
                <button onclick="window.verifyPassword()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl">Xem</button>
            </div>
        </div>
    </div>
</body>
</html>
